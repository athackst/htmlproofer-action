name: Test

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: Unit tests
        run: bundle exec rspec spec/*_spec.rb

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: Unit tests
        run: bundle exec rubocop lib/* spec/*

  test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: althack/htmlproofer${{ github.event.pull_request.number || github.ref }}
          push: false

  test-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build docs
        uses: athackst/mkdocs-simple-plugin@main
        with:
          push: false
      - name: Cache HTMLProofer
        uses: actions/cache@v5
        with:
          path: tmp/.htmlproofer
          key: htmlproofer
      - name: Test docs
        uses: ./
        with:
          directory: site/

  complete:
    needs: [unit, lint, test-docker, test-site]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "All tests passed!"
