name: HTMLProofer Action
description: Run HTMLProofer through the Ruby gem API with broad option support, retries, and cache-friendly defaults.
branding:
  icon: link
  color: green

inputs:
  # required inputs
  directory:
    description: Directory containing the built site
    required: true
    default: "./_site"
  # optional inputs
  allow_hash_href:
    description: Whether `href="#"` anchors are valid
    required: false
  allow_missing_href:
    description: Do not flag a tags missing href
    required: false
  assume_extension:
    description: Automatically add extension (e.g. .html) to file paths, to allow extensionless URLs (as supported by Jekyll 3 and GitHub Pages)
    required: false
  check_favicon:
    description: Check whether favicons are valid
    required: false
  check_links:
    description: Check whether 'a', 'link' elements are working
    required: false
  check_images:
    description: Check whether 'img' elements are working
    required: false
  check_scripts:
    description: Check whether 'script' elements are working
    required: false
  check_opengraph:
    description: Check images and URLs in Open Graph metadata
    required: false
  check_external_hash:
    description: Check whether external anchors exist
    required: false
  check_internal_hash:
    description: Check whether internal anchors exist
    required: false
  check_sri:
    description: Check that `<link>` and `<script>` external resources use SRI
    required: false
  directory_index_file:
    description: Sets the file to look for when a link refers to a directory.
    required: false
  disable_external:
    description: If `true`, does not run the external link checker
    required: false
  enforce_https:
    description: Require that links use HTTPS
    required: false
  extensions:
    description: Comma- or newline-separated file extensions to check, including the leading dot
    required: false
  ignore_empty_alt:
    description: If `true`, allows images with empty alt attributes
    required: false
  ignore_files:
    description: Comma- or newline-separated file paths or regular expressions to ignore
    required: false
  ignore_empty_mailto:
    description:  If `true`, allows `mailto:` `href`s which do not contain an email address.
    required: false
  ignore_missing_alt:
    description: If `true`, ignores images with missing alt tags
    required: false
  ignore_status_codes:
    description: Comma- or newline-separated HTTP status codes to ignore
    required: false
  ignore_urls:
    description: Comma- or newline-separated URLs or regular expressions to ignore
    required: false
  ignore_common:
    description: Ignore URLs that commonly reject automated link checks
    required: false
    default: 'true'
  ignore_new_files:
    description: On pull requests, ignore files that are new or renamed
    required: false
    default: 'false'
  swap_urls:
    description: Comma- or newline-separated regular-expression:replacement URL substitutions
    required: false
  host:
    description: Public host used to resolve absolute site URLs as local
    required: false
    default: ${{ github.repository_owner }}.github.io
  base_path:
    description: Path below the host where the site is published
    required: false
    default: /${{ github.event.repository.name }}
  site_url_swap:
    description: Generate URL substitutions from host and base_path
    required: false
    default: 'true'
  # Hydra options
  max_concurrency:
    description: Maximum number of concurrent HTTP requests
    required: false
  # Typhoeus options
  connect_timeout:
    description: HTTP connection timeout in seconds
    required: false
  followlocation:
    description: If 'true' will follow redirections
    required: false
  ssl_verifypeer:
    description: Verify the remote TLS certificate
    required: false
  ssl_verifyhost:
    description: curl host-verification setting (use 2 to verify)
    required: false
  timeout:
    description: HTTP request timeout in seconds
    required: false
  # Other
  retries:
    description: Total attempts before failure; retries wait 60 seconds
    required: false
    default: 6
  retry_wait:
    description: Seconds to wait between failed attempts
    required: false
    default: 60
  cache:
    description: JSON configuration for HTMLProofer caching
    required: false
    default: '{ "timeframe": { "external": "2w", "internal": "1w" } }'
  gh_token:
    description: GitHub token used to inspect pull-request changes
    required: false
    default: ${{ github.token }}
  # Deprecated
  check_html:
    description: Validate HTML
    required: false
    deprecationMessage: use `check_links`
  check_img_http:
    description: Enforce that images use HTTPS
    required: false
    deprecationMessage: use `check_images`
  empty_alt_ignore:
    description: Allow images with empty alt tags
    required: false
    deprecationMessage: Use `ignore_empty_alt` instead
  missing_alt_ignore:
    description: Allow images with missing alt tags
    required: false
    deprecationMessage: Use `ignore_missing_alt` instead
  url_ignore:
    description: Newline-separated list of URLs to ignore
    required: false
    deprecationMessage: Use `ignore_urls` instead
  url_ignore_re:
    description: Newline-separated list of URL regexes to ignore
    required: false
    deprecationMessage: Use `ignore_urls` instead
  url_swap:
    description: Newline-separated list of regex expressions to swap in urls
    required: false
    deprecationMessage: Use `swap_urls` instead
  internal_domains:
    description: Newline-separated list of internal domains
    required: false
    deprecationMessage: Setting `internal_domains` has been deprecated in htmlproofer
  max_paralell:
    description: Maximum parallel processes
    required: false
    deprecationMessage: Setting `max_paralell` has been deprecated in htmlproofer

runs:
  using: "docker"
  image: "Dockerfile"
